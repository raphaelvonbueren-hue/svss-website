<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVSS — Schweizerische Vereinigung Sichere Spielplätze</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --gd:#1a3a2a; --gm:#2d6a4a; --gs:#4a9068; --gp:#d4ead8; --gl:#f0f7f1;
    --accent:#c8522a; --cream:#faf8f3; --sand:#f5f1e8; --sand-d:#e8e2d4; --white:#fff;
    --text:#1a1a18; --soft:#4a4a44; --muted:#8a8a80; --border:#e3ddd0;
    --r:8px; --rl:16px; --sh-s:0 2px 8px rgba(0,0,0,.06); --sh-m:0 10px 34px rgba(0,0,0,.10);
    --sh-l:0 24px 70px rgba(0,0,0,.16); --t:.22s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'DM Sans',-apple-system,sans-serif;color:var(--text);background:var(--cream);
    line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.serif{font-family:'DM Serif Display',Georgia,serif;font-weight:400;line-height:1.12}
  a{color:var(--gm);text-decoration:none}
  img{max-width:100%;display:block}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r);transition:var(--t);font-size:14px}
  input,textarea,select{font-family:inherit;font-size:15px;width:100%;padding:11px 13px;border:1px solid var(--border);
    border-radius:var(--r);background:var(--white);color:var(--text)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gs);box-shadow:0 0 0 3px var(--gp)}
  textarea{resize:vertical;line-height:1.55}
  .wrap{max-width:1140px;margin:0 auto;padding:0 24px}
  .btn{padding:11px 22px;font-weight:600;border-radius:var(--r);font-size:14px}
  .btn-p{background:var(--gm);color:#fff}.btn-p:hover{background:var(--gd)}
  .btn-a{background:var(--accent);color:#fff}.btn-a:hover{filter:brightness(.93)}
  .btn-o{background:var(--white);color:var(--gm);border:1px solid var(--border)}.btn-o:hover{background:var(--gl);border-color:var(--gs)}
  .btn-sm{padding:7px 13px;font-size:13px;font-weight:600;border-radius:6px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* NAV */
  header.nav{position:sticky;top:0;z-index:40;background:rgba(250,248,243,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:68px}
  .logo{display:flex;align-items:center;gap:11px;cursor:pointer}
  .logo .mk{width:38px;height:38px;border-radius:10px;background:var(--gm);color:#fff;display:grid;place-items:center;
    font-family:'DM Serif Display',serif;font-size:18px}
  .logo .tx b{display:block;font-weight:700;font-size:15px;letter-spacing:.2px;line-height:1.1}
  .logo .tx span{font-size:11px;color:var(--muted)}
  .nav-links{display:flex;align-items:center;gap:26px}
  .nav-links a{color:var(--soft);font-weight:500;font-size:14.5px;cursor:pointer}
  .nav-links a:hover{color:var(--gd)}
  .nav-burger{display:none;background:none;font-size:22px;color:var(--gd)}

  /* HERO */
  .hero{background:linear-gradient(160deg,var(--gd),var(--gm) 75%);color:#eef4ee;padding:84px 0 96px;position:relative;overflow:hidden}
  .hero:after{content:"";position:absolute;right:-120px;bottom:-120px;width:420px;height:420px;border-radius:50%;
    background:rgba(255,255,255,.05)}
  .hero h1{font-size:clamp(38px,6vw,62px);color:#fff;margin:0}
  .hero .accent{color:var(--gp)}
  .hero p{max-width:560px;font-size:18px;color:#cfe0d2;margin:22px 0 32px}
  .hero .cta{display:flex;gap:14px;flex-wrap:wrap}
  .hero .btn-light{background:#fff;color:var(--gd)}.hero .btn-light:hover{background:var(--gp)}
  .hero .btn-line{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}.hero .btn-line:hover{background:rgba(255,255,255,.12)}

  /* STATS */
  .stats{background:var(--gd);color:#cfe0d2;padding:1px 0}
  .stats-in{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.08)}
  .stat{background:var(--gd);padding:26px 22px;text-align:center}
  .stat .n{font-family:'DM Serif Display',serif;font-size:30px;color:#fff;line-height:1}
  .stat .l{font-size:13px;margin-top:7px}

  section{padding:76px 0}
  .eyebrow{color:var(--accent);font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase}
  .sec-title{font-size:clamp(28px,4vw,40px);margin:8px 0 0}
  .lead{color:var(--soft);font-size:17px;max-width:640px;margin-top:16px}

  /* MEMBER GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;margin-top:36px}
  .firm{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:24px;cursor:pointer;
    transition:var(--t);display:flex;flex-direction:column;gap:8px}
  .firm:hover{transform:translateY(-3px);box-shadow:var(--sh-m);border-color:var(--gp)}
  .firm .lg{height:48px;display:flex;align-items:center;margin-bottom:6px}
  .firm .lg img{max-height:48px;width:auto;object-fit:contain}
  .firm .lg .ph{width:46px;height:46px;border-radius:10px;background:var(--gl);color:var(--gm);display:grid;place-items:center;
    font-family:'DM Serif Display',serif;font-size:20px}
  .firm h3{font-family:'DM Sans',sans-serif;font-weight:700;font-size:17px;line-height:1.25}
  .firm .loc{color:var(--muted);font-size:13.5px}
  .firm .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .tag{background:var(--gl);color:var(--gm);font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}

  /* ABOUT / VORSTAND / NEWS */
  .about{background:var(--sand)}
  .vorstand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px;margin-top:32px}
  .vb{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:22px;text-align:center}
  .vb .av{width:64px;height:64px;border-radius:50%;background:var(--gp);color:var(--gd);display:grid;place-items:center;
    margin:0 auto 12px;font-family:'DM Serif Display',serif;font-size:24px}
  .vb b{display:block;font-size:15px}.vb span{color:var(--muted);font-size:13px}
  .news{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:32px}
  .nc{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:24px}
  .nc .meta{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .nc .date{font-family:'DM Serif Display',serif;font-size:15px;color:var(--accent)}
  .nc h3{font-family:'DM Sans',sans-serif;font-weight:700;font-size:17px;margin:0 0 8px}
  .nc p{color:var(--soft);font-size:14.5px;margin:0}

  /* FOOTER */
  footer{background:var(--gd);color:#a9c2af;padding:54px 0 30px;font-size:14px}
  footer a{color:#cfe0d2}
  .foot-top{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;padding-bottom:30px;border-bottom:1px solid rgba(255,255,255,.1)}
  .foot-bot{padding-top:22px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:#7d9a85}

  /* SUBPAGE */
  .sub-hero{background:var(--sand);padding:48px 0;border-bottom:1px solid var(--border)}
  .sub-head{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .sub-head .lg{width:88px;height:88px;border-radius:var(--rl);background:var(--white);border:1px solid var(--border);
    display:grid;place-items:center;overflow:hidden;padding:8px}
  .sub-head .lg img{max-height:72px;width:auto;object-fit:contain}
  .sub-head .lg .ph{font-family:'DM Serif Display',serif;font-size:32px;color:var(--gm)}
  .sub-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:40px;margin-top:44px}
  .info-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:14.5px}
  .info-row .k{color:var(--muted);min-width:120px;font-weight:500}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:500;cursor:pointer;font-size:14px}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(26,58,42,.5);display:none;place-items:center;z-index:60;padding:20px}
  .overlay.show{display:grid}
  .modal{background:var(--white);border-radius:var(--rl);box-shadow:var(--sh-l);width:100%;max-width:400px;padding:32px}
  .modal h2{font-size:24px;margin:0 0 4px}
  .modal p.sub{color:var(--muted);font-size:14px;margin:0 0 22px}
  .fg{margin-bottom:14px}.fg label{display:block;font-size:12.5px;font-weight:600;color:var(--soft);margin:0 0 5px}
  .err{color:var(--accent);font-size:13.5px;min-height:18px;margin-top:6px}

  /* PORTAL / ADMIN */
  .panel{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:28px;margin-bottom:22px}
  .panel h2{font-size:22px;margin:0 0 4px}.panel .ph{color:var(--muted);font-size:14px;margin:0 0 22px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-grid .full{grid-column:1/-1}
  .tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .tab{padding:9px 18px;border-radius:30px;background:var(--white);border:1px solid var(--border);font-weight:600;color:var(--soft)}
  .tab.active{background:var(--gd);color:#fff;border-color:var(--gd)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--sand)}
  .badge{font-size:11.5px;font-weight:650;padding:3px 10px;border-radius:20px}
  .badge.active{background:var(--gl);color:var(--gm)}.badge.blocked{background:#fbe7df;color:var(--accent)}
  td.r{text-align:right;white-space:nowrap}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:#fff;
    padding:12px 22px;border-radius:30px;font-size:14px;box-shadow:var(--sh-m);opacity:0;pointer-events:none;transition:var(--t);z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.err{background:var(--accent)}
  .config-warn{background:#fff4e8;border:1px solid #f0c89a;color:#9a5a1a;padding:14px 18px;border-radius:var(--r);
    margin:20px auto;max-width:1140px;font-size:14px}
  .hidden{display:none!important}

  @media(max-width:820px){
    .nav-links{display:none}.nav-burger{display:block}
    .nav-links.open{display:flex;position:absolute;top:68px;left:0;right:0;flex-direction:column;background:var(--cream);
      padding:18px 24px;gap:16px;border-bottom:1px solid var(--border)}
    .stats-in{grid-template-columns:repeat(2,1fr)}
    .sub-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div id="config-warn" class="config-warn hidden"></div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<!-- LOGIN MODAL -->
<div class="overlay" id="login-modal">
  <div class="modal">
    <h2>Anmelden</h2>
    <p class="sub">Mitglieder- und Vorstandsbereich</p>
    <div class="fg"><label>Benutzername</label><input id="lg-user" autocomplete="username" autocapitalize="off"></div>
    <div class="fg"><label>Passwort</label><input id="lg-pw" type="password" autocomplete="current-password"></div>
    <button class="btn btn-p" style="width:100%;margin-top:8px" onclick="doLogin()">Anmelden →</button>
    <div class="err" id="lg-err"></div>
    <p style="text-align:center;margin:14px 0 0;font-size:13px"><a onclick="closeLogin()" style="cursor:pointer;color:var(--muted)">Abbrechen</a></p>
  </div>
</div>

<script>
/* ======================================================================
   KONFIGURATION — nach Anlegen des Supabase-Projekts hier eintragen:
   ====================================================================== */
const SUPA_URL = 'https://incjdnfwjhmbnenhkwwu.supabase.co';
const SUPA_KEY = 'sb_publishable_R5FUE8lNPrQag-p6rIJIJQ_9VXzPwj9';
/* ====================================================================== */

const TOKEN_KEY = 'svss_token';
let SESSION = null;          // {role, company_slug, name}
let CONTENT = {};            // site_content keyed
let COMPANIES = [];          // active companies (public)

const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const token = ()=>localStorage.getItem(TOKEN_KEY);

let toastT;
function toast(m,type){const t=$('toast');t.textContent=m;t.className='toast show'+(type==='err'?' err':'');
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2800);}

function configured(){ return SUPA_URL && SUPA_KEY; }

/* ---------- Supabase ---------- */
function heads(){const h={apikey:SUPA_KEY,'Content-Type':'application/json'};
  if(SUPA_KEY.startsWith('eyJ'))h['Authorization']='Bearer '+SUPA_KEY; // nur Legacy-JWT-Keys als Bearer
  return h;}
async function rpc(fn,args){
  const r=await fetch(SUPA_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:heads(),body:JSON.stringify(args||{})});
  const txt=await r.text(); let data; try{data=JSON.parse(txt);}catch{data=txt;}
  if(!r.ok) throw new Error((data&&data.message)||('Fehler '+r.status));
  return data;
}
async function sel(table,query){
  const p=new URLSearchParams(query||{});
  const r=await fetch(SUPA_URL+'/rest/v1/'+table+'?'+p,{headers:{...heads(),Accept:'application/json'}});
  if(!r.ok) throw new Error('Laden fehlgeschlagen ('+r.status+')');
  return r.json();
}

/* ---------- Daten laden ---------- */
async function loadPublic(){
  const [content, comps] = await Promise.all([
    sel('site_content',{select:'*'}),
    sel('companies',{select:'*',status:'eq.active',order:'sort_order.asc'})
  ]);
  CONTENT={}; content.forEach(r=>CONTENT[r.key]=r.value);
  COMPANIES=comps;
}
async function restoreSession(){
  if(!token()) return;
  try{ const r=await rpc('me',{p_token:token()}); SESSION = r.ok ? r : null; if(!r.ok) localStorage.removeItem(TOKEN_KEY); }
  catch{ SESSION=null; }
}

/* ---------- Auth ---------- */
function openLogin(){ $('lg-err').textContent=''; $('lg-user').value=''; $('lg-pw').value=''; $('login-modal').classList.add('show'); setTimeout(()=>$('lg-user').focus(),50); }
function closeLogin(){ $('login-modal').classList.remove('show'); }
async function doLogin(){
  const u=$('lg-user').value.trim(), p=$('lg-pw').value;
  $('lg-err').textContent='';
  try{
    const r=await rpc('login',{p_user:u,p_pw:p});
    if(!r.ok){ $('lg-err').textContent='Benutzername oder Passwort falsch.'; return; }
    localStorage.setItem(TOKEN_KEY,r.token);
    SESSION={role:r.role,company_slug:r.company_slug,name:r.name};
    closeLogin();
    location.hash = r.role==='board' ? '#/vorstand' : '#/konto';
    toast('Willkommen, '+r.name);
  }catch(e){ $('lg-err').textContent='Verbindungsfehler.'; }
}
async function logout(){ try{await rpc('logout',{p_token:token()});}catch{} localStorage.removeItem(TOKEN_KEY); SESSION=null; location.hash='#/'; toast('Abgemeldet'); }

/* ---------- Router ---------- */
async function route(){
  const h=location.hash||'#/';
  if(!configured()){ $('config-warn').classList.remove('hidden');
    $('config-warn').innerHTML='⚙ Noch nicht konfiguriert: trage oben im Code <b>SUPA_URL</b> und <b>SUPA_KEY</b> deines neuen Supabase-Projekts ein.';
  }
  try{
    if(h.startsWith('#/firma/')){ await ensurePublic(); renderCompany(decodeURIComponent(h.slice(8))); }
    else if(h==='#/konto'){ if(!SESSION){openLogin();location.hash='#/';return;} renderPortal(); }
    else if(h==='#/vorstand'){ if(!SESSION||SESSION.role!=='board'){openLogin();location.hash='#/';return;} renderAdmin(); }
    else { await ensurePublic(); renderHome(); }
  }catch(e){ $('app').innerHTML='<div class="wrap" style="padding:60px 24px"><p>Fehler beim Laden. '+esc(e.message)+'</p></div>'; }
  window.scrollTo(0,0);
}
let _pubLoaded=false;
async function ensurePublic(){ if(!configured())return; if(!_pubLoaded){ await loadPublic(); _pubLoaded=true; } }

/* ---------- Shared chrome ---------- */
function nav(){
  const acct = SESSION
    ? `<a onclick="location.hash='${SESSION.role==='board'?'#/vorstand':'#/konto'}'">${esc(SESSION.name)}</a><a onclick="logout()">Abmelden</a>`
    : `<a onclick="openLogin()">Login</a>`;
  return `<header class="nav"><div class="wrap nav-in">
    <div class="logo" onclick="location.hash='#/'">
      <div class="mk">S</div><div class="tx"><b>SVSS</b><span>Sichere Spielplätze</span></div>
    </div>
    <button class="nav-burger" onclick="document.getElementById('navlinks').classList.toggle('open')">☰</button>
    <nav class="nav-links" id="navlinks">
      <a onclick="goSection('mitglieder')">Mitglieder</a>
      <a onclick="goSection('ueber')">Über uns</a>
      <a onclick="goSection('news')">News</a>
      ${acct}
    </nav></div></header>`;
}
function goSection(id){ if(location.hash!=='#/'&&location.hash!==''){ location.hash='#/'; setTimeout(()=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'}),300);} else document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); document.getElementById('navlinks').classList.remove('open'); }
function footer(){
  const c=CONTENT.contact||{};
  return `<footer><div class="wrap">
    <div class="foot-top">
      <div style="max-width:300px"><div class="logo" style="margin-bottom:12px"><div class="mk" style="background:#fff;color:var(--gd)">S</div><div class="tx"><b style="color:#fff">SVSS</b><span>Sichere Spielplätze</span></div></div>
        <p style="margin:0">Schweizerische Vereinigung Sichere Spielplätze — für sichere, kindgerechte Spiel- und Freizeitanlagen.</p></div>
      <div><b style="color:#fff;display:block;margin-bottom:10px">Kontakt</b>
        <p style="margin:0">${c.email?`<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:''}</p></div>
      <div><b style="color:#fff;display:block;margin-bottom:10px">Bereich</b>
        <p style="margin:0"><a onclick="openLogin()" style="cursor:pointer">Mitglieder-Login</a></p></div>
    </div>
    <div class="foot-bot"><span>© ${new Date().getFullYear()} SVSS</span><span>EN 1176 / 1177</span></div>
  </div></footer>`;
}
function initials(name){ return (name||'?').replace(/[^A-Za-zÄÖÜäöü0-9 ]/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?'; }

/* ---------- HOME ---------- */
function renderHome(){
  const hero=CONTENT.hero||{}, stats=CONTENT.stats||[], about=CONTENT.about||{}, board=CONTENT.board||[], news=CONTENT.news||[];
  $('app').innerHTML = nav() + `
  <section class="hero" style="padding-bottom:96px"><div class="wrap">
    <h1>${esc(hero.title||'Sichere Spielplätze.')}<br><span class="accent">${esc(hero.title2||'Für alle Kinder.')}</span></h1>
    <p>${esc(hero.intro||'')}</p>
    <div class="cta"><button class="btn btn-light" onclick="goSection('mitglieder')">Fachperson finden →</button>
      <button class="btn btn-line" onclick="goSection('ueber')">Über die SVSS</button></div>
  </div></section>
  <div class="stats"><div class="wrap"><div class="stats-in">
    ${stats.map(s=>`<div class="stat"><div class="n">${esc(s.n)}</div><div class="l">${esc(s.l)}</div></div>`).join('')}
  </div></div></div>

  <section id="ueber" class="about"><div class="wrap">
    <div class="eyebrow">Über die SVSS</div><h2 class="sec-title">${esc(about.title||'Unser Zweck & unsere Ziele')}</h2>
    <p class="lead">${esc(about.text||'')}</p>
    ${board.length?`<div class="vorstand-grid">${board.map(v=>`<div class="vb"><div class="av">${esc(initials(v.name))}</div><b>${esc(v.name)}</b><span>${esc(v.role||'')}</span></div>`).join('')}</div>`:''}
  </div></section>

  <section id="mitglieder"><div class="wrap">
    <div class="eyebrow">Mitglieder</div><h2 class="sec-title">${COMPANIES.length} Fachfirmen im Verband</h2>
    <p class="lead">Geprüfte Fachfirmen für Planung, Bau, Inspektion und Unterhalt sicherer Spielplätze.</p>
    <div class="grid">${COMPANIES.map(firmCard).join('')||'<p class="lead">Noch keine Mitglieder erfasst.</p>'}</div>
  </div></section>

  <section id="news" class="about"><div class="wrap">
    <div class="eyebrow">Aktuelles</div><h2 class="sec-title">News & Veranstaltungen</h2>
    <div class="news">${news.map(n=>`<div class="nc"><div class="meta"><span class="date">${esc(n.date||'')}</span><span class="tag">${esc(n.tag||'')}</span></div><h3>${esc(n.title||'')}</h3><p>${esc(n.text||'')}</p></div>`).join('')||'<p class="lead">Aktuell keine Meldungen.</p>'}</div>
  </div></section>` + footer();
}
function firmCard(c){
  const loc=[c.zip,c.city].filter(Boolean).join(' ');
  return `<div class="firm" onclick="location.hash='#/firma/${encodeURIComponent(c.slug)}'">
    <div class="lg">${c.logo_url?`<img src="${esc(c.logo_url)}" alt="">`:`<div class="ph">${esc(initials(c.name))}</div>`}</div>
    <h3>${esc(c.name)}</h3>
    <div class="loc">${esc(loc||c.canton||'Schweiz')}</div>
    ${(c.tags&&c.tags.length)?`<div class="tags">${c.tags.slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
  </div>`;
}

/* ---------- COMPANY SUBPAGE ---------- */
function renderCompany(slug){
  const c=COMPANIES.find(x=>x.slug===slug);
  if(!c){ $('app').innerHTML=nav()+`<div class="wrap" style="padding:80px 24px"><span class="back" onclick="location.hash='#/'">← Zurück</span><h1 style="margin-top:20px">Firma nicht gefunden</h1></div>`+footer(); return; }
  const rows=[['Ansprechperson',c.contact_person],['Adresse',[c.street,[c.zip,c.city].filter(Boolean).join(' ')].filter(Boolean).join(', ')],
    ['Kanton',c.canton],['Telefon',c.phone],['E-Mail',c.email?`<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:''],
    ['Website',c.website?`<a href="${esc(c.website)}" target="_blank" rel="noopener">${esc(c.website.replace(/^https?:\/\//,''))}</a>`:''],
    ['Kategorie',c.category]].filter(r=>r[1]);
  $('app').innerHTML = nav() + `
  <div class="sub-hero"><div class="wrap">
    <span class="back" onclick="location.hash='#/'">← Alle Mitglieder</span>
    <div class="sub-head" style="margin-top:18px">
      <div class="lg">${c.logo_url?`<img src="${esc(c.logo_url)}" alt="">`:`<div class="ph">${esc(initials(c.name))}</div>`}</div>
      <div><h1 style="font-size:36px">${esc(c.name)}</h1>
        ${(c.tags&&c.tags.length)?`<div class="tags" style="margin-top:10px">${c.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}</div>
    </div>
  </div></div>
  <section><div class="wrap"><div class="sub-grid">
    <div>${c.description?`<div class="eyebrow">Über die Firma</div><p class="lead" style="white-space:pre-line">${esc(c.description)}</p>`:'<p class="lead">Diese Firma hat noch keine Beschreibung hinterlegt.</p>'}</div>
    <div><div class="panel" style="margin:0">${rows.map(r=>`<div class="info-row"><span class="k">${esc(r[0])}</span><span>${r[1]}</span></div>`).join('')||'<p style="color:var(--muted)">Keine Kontaktdaten.</p>'}</div></div>
  </div></div></section>` + footer();
}

/* ---------- MEMBER PORTAL ---------- */
async function renderPortal(){
  $('app').innerHTML = nav() + `<section><div class="wrap" id="portal-body"><p class="lead">Lade…</p></div></section>` + footer();
  let c={};
  try{ const rows=await sel('companies',{select:'*',slug:'eq.'+SESSION.company_slug}); c=rows[0]||{}; }catch{}
  const f=(k,v)=>`<input id="p-${k}" value="${esc(v||'')}">`;
  $('portal-body').innerHTML = `
    <div class="eyebrow">Mein Bereich</div><h2 class="sec-title">${esc(c.name||SESSION.name)}</h2>
    <p class="lead">Pflege hier die Angaben deiner Firma. Sie erscheinen auf deiner öffentlichen Unterseite.</p>
    <div class="panel" style="margin-top:30px">
      <div class="form-grid">
        <div class="full"><label>Firmenname</label>${f('name',c.name)}</div>
        <div><label>Ansprechperson</label>${f('contact_person',c.contact_person)}</div>
        <div><label>Kategorie</label>${f('category',c.category)}</div>
        <div><label>Strasse</label>${f('street',c.street)}</div>
        <div><label>PLZ / Ort</label><div style="display:flex;gap:8px"><input id="p-zip" style="max-width:90px" value="${esc(c.zip||'')}"><input id="p-city" value="${esc(c.city||'')}"></div></div>
        <div><label>Kanton</label>${f('canton',c.canton)}</div>
        <div><label>Telefon</label>${f('phone',c.phone)}</div>
        <div><label>E-Mail</label>${f('email',c.email)}</div>
        <div><label>Website</label>${f('website',c.website)}</div>
        <div class="full"><label>Logo-URL</label>${f('logo_url',c.logo_url)}</div>
        <div class="full"><label>Tags (mit Komma getrennt)</label><input id="p-tags" value="${esc((c.tags||[]).join(', '))}"></div>
        <div class="full"><label>Beschreibung</label><textarea id="p-description" rows="5">${esc(c.description||'')}</textarea></div>
      </div>
      <button class="btn btn-p" style="margin-top:18px" onclick="saveMyCompany()">Speichern</button>
    </div>
    <div class="panel">
      <h2 style="font-size:18px">Passwort ändern</h2>
      <div class="form-grid"><div><label>Neues Passwort</label><input id="np1" type="password"></div>
        <div><label>Wiederholen</label><input id="np2" type="password"></div></div>
      <button class="btn btn-o" style="margin-top:14px" onclick="changePw()">Passwort ändern</button>
    </div>`;
}
function getVal(k){return $('p-'+k).value.trim();}
async function saveMyCompany(){
  const patch={name:getVal('name'),contact_person:getVal('contact_person'),category:getVal('category'),
    street:getVal('street'),zip:getVal('zip'),city:getVal('city'),canton:getVal('canton'),phone:getVal('phone'),
    email:getVal('email'),website:getVal('website'),logo_url:getVal('logo_url'),description:getVal('description'),
    tags:getVal('tags').split(',').map(s=>s.trim()).filter(Boolean)};
  try{ await rpc('update_my_company',{p_token:token(),p_patch:patch}); _pubLoaded=false; toast('Gespeichert ✓'); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}
async function changePw(){
  const a=$('np1').value,b=$('np2').value;
  if(a.length<6){toast('Mindestens 6 Zeichen','err');return;}
  if(a!==b){toast('Passwörter stimmen nicht überein','err');return;}
  try{ await rpc('change_my_password',{p_token:token(),p_new:a}); $('np1').value='';$('np2').value=''; toast('Passwort geändert ✓'); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}

/* ---------- BOARD ADMIN ---------- */
let ADMIN={companies:[],accounts:[]}, adminTab='members';
async function renderAdmin(){
  $('app').innerHTML = nav() + `<section><div class="wrap">
    <div class="eyebrow">Vorstand</div><h2 class="sec-title">Verwaltung</h2>
    <div class="tabs" style="margin-top:24px">
      <button class="tab ${adminTab==='members'?'active':''}" onclick="adminTab='members';renderAdmin()">Mitglieder</button>
      <button class="tab ${adminTab==='content'?'active':''}" onclick="adminTab='content';renderAdmin()">Inhalte</button>
    </div>
    <div id="admin-body"><p class="lead">Lade…</p></div>
  </div></section>` + footer();
  try{ ADMIN=await rpc('board_list',{p_token:token()}); }catch(e){ $('admin-body').innerHTML='<p class="lead">Fehler: '+esc(e.message)+'</p>'; return; }
  adminTab==='content'?renderAdminContent():renderAdminMembers();
}
function renderAdminMembers(){
  const acctBySlug={}; ADMIN.accounts.forEach(a=>{if(a.company_slug)acctBySlug[a.company_slug]=a;});
  $('admin-body').innerHTML = `
    <div class="panel">
      <h2 style="font-size:18px">Neues Mitglied</h2>
      <div class="form-grid">
        <div><label>Firmenname</label><input id="a-name"></div>
        <div><label>Slug (für URL/Login, klein)</label><input id="a-slug" placeholder="z.B. mustermann"></div>
        <div><label>Benutzername</label><input id="a-user" placeholder="meist = slug"></div>
        <div><label>Start-Passwort</label><input id="a-pw"></div>
        <div class="full"><label>E-Mail (optional)</label><input id="a-email"></div>
      </div>
      <button class="btn btn-p" style="margin-top:16px" onclick="addMember()">Mitglied hinzufügen</button>
    </div>
    <div class="panel" style="padding:0;overflow:hidden">
      <table><thead><tr><th>Firma</th><th>Login</th><th>Status</th><th class="r">Aktionen</th></tr></thead><tbody>
      ${ADMIN.companies.map(c=>{const a=acctBySlug[c.slug];return `<tr>
        <td><b>${esc(c.name)}</b><br><span style="color:var(--muted);font-size:12px">${esc(c.slug)}</span></td>
        <td>${a?esc(a.username):'<span style="color:var(--muted)">—</span>'}</td>
        <td><span class="badge ${c.status}">${c.status==='active'?'aktiv':'gesperrt'}</span></td>
        <td class="r">
          <button class="btn-sm btn-o" onclick="toggleStatus('${esc(c.slug)}','${c.status}')">${c.status==='active'?'Sperren':'Entsperren'}</button>
          <button class="btn-sm btn-o" onclick="resetPw('${esc(a?a.username:'')}')">PW</button>
          <button class="btn-sm btn-a" onclick="delMember('${esc(c.slug)}','${esc(c.name)}')">Löschen</button>
        </td></tr>`;}).join('')}
      </tbody></table>
    </div>`;
}
async function addMember(){
  const name=$('a-name').value.trim(),slug=$('a-slug').value.trim().toLowerCase().replace(/\s+/g,'-'),
    user=($('a-user').value.trim()||slug).toLowerCase(),pw=$('a-pw').value,email=$('a-email').value.trim();
  if(!name||!slug||!pw){toast('Name, Slug und Passwort sind nötig','err');return;}
  if(pw.length<6){toast('Passwort mind. 6 Zeichen','err');return;}
  try{ await rpc('board_add_member',{p_token:token(),p_name:name,p_slug:slug,p_username:user,p_password:pw,p_email:email||null});
    _pubLoaded=false; toast('Mitglied hinzugefügt ✓'); renderAdmin(); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}
async function toggleStatus(slug,cur){
  try{ await rpc('board_set_status',{p_token:token(),p_slug:slug,p_status:cur==='active'?'blocked':'active'});
    _pubLoaded=false; toast('Status geändert ✓'); renderAdmin(); }catch(e){ toast('Fehler: '+e.message,'err'); }
}
async function delMember(slug,name){
  if(!confirm('"'+name+'" wirklich löschen? Firma und Login werden entfernt.'))return;
  try{ await rpc('board_delete_member',{p_token:token(),p_slug:slug}); _pubLoaded=false; toast('Gelöscht ✓'); renderAdmin(); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}
async function resetPw(user){
  if(!user){toast('Kein Login vorhanden','err');return;}
  const pw=prompt('Neues Passwort für "'+user+'" (mind. 6 Zeichen):');
  if(!pw)return; if(pw.length<6){toast('Zu kurz','err');return;}
  try{ await rpc('board_reset_password',{p_token:token(),p_username:user,p_newpw:pw}); toast('Passwort gesetzt ✓'); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}
function renderAdminContent(){
  const hero=CONTENT.hero||{},about=CONTENT.about||{},contact=CONTENT.contact||{},
    stats=CONTENT.stats||[],news=CONTENT.news||[],board=CONTENT.board||[];
  $('admin-body').innerHTML = `
    <div class="panel"><h2 style="font-size:18px">Hero (Startseite oben)</h2>
      <div class="form-grid">
        <div><label>Titel Zeile 1</label><input id="c-h-title" value="${esc(hero.title||'')}"></div>
        <div><label>Titel Zeile 2</label><input id="c-h-title2" value="${esc(hero.title2||'')}"></div>
        <div class="full"><label>Einleitung</label><textarea id="c-h-intro" rows="3">${esc(hero.intro||'')}</textarea></div>
      </div><button class="btn btn-p" style="margin-top:14px" onclick="saveHero()">Hero speichern</button></div>

    <div class="panel"><h2 style="font-size:18px">Über uns</h2>
      <div class="form-grid">
        <div class="full"><label>Titel</label><input id="c-a-title" value="${esc(about.title||'')}"></div>
        <div class="full"><label>Text</label><textarea id="c-a-text" rows="4">${esc(about.text||'')}</textarea></div>
      </div><button class="btn btn-p" style="margin-top:14px" onclick="saveAbout()">Über uns speichern</button></div>

    <div class="panel"><h2 style="font-size:18px">Kennzahlen</h2>
      <div id="stats-rows">${stats.map((s,i)=>statRow(s,i)).join('')}</div>
      <button class="btn-sm btn-o" onclick="addStatRow()" style="margin-top:10px">+ Zeile</button>
      <div><button class="btn btn-p" style="margin-top:14px" onclick="saveStats()">Kennzahlen speichern</button></div></div>

    <div class="panel"><h2 style="font-size:18px">Vorstand</h2>
      <div id="board-rows">${board.map((b,i)=>boardRow(b,i)).join('')}</div>
      <button class="btn-sm btn-o" onclick="addBoardRow()" style="margin-top:10px">+ Person</button>
      <div><button class="btn btn-p" style="margin-top:14px" onclick="saveBoard()">Vorstand speichern</button></div></div>

    <div class="panel"><h2 style="font-size:18px">News</h2>
      <div id="news-rows">${news.map((n,i)=>newsRow(n,i)).join('')}</div>
      <button class="btn-sm btn-o" onclick="addNewsRow()" style="margin-top:10px">+ Meldung</button>
      <div><button class="btn btn-p" style="margin-top:14px" onclick="saveNews()">News speichern</button></div></div>

    <div class="panel"><h2 style="font-size:18px">Kontakt</h2>
      <div class="fg"><label>E-Mail</label><input id="c-contact-email" value="${esc(contact.email||'')}"></div>
      <button class="btn btn-p" onclick="saveContact()">Kontakt speichern</button></div>`;
}
function statRow(s,i){return `<div class="form-grid" style="margin-bottom:8px"><div><input class="st-n" value="${esc(s.n||'')}" placeholder="Zahl"></div><div><input class="st-l" value="${esc(s.l||'')}" placeholder="Beschriftung"></div></div>`;}
function addStatRow(){$('stats-rows').insertAdjacentHTML('beforeend',statRow({},0));}
function boardRow(b){return `<div class="form-grid" style="margin-bottom:8px"><div><input class="bd-n" value="${esc(b.name||'')}" placeholder="Name"></div><div><input class="bd-r" value="${esc(b.role||'')}" placeholder="Funktion"></div></div>`;}
function addBoardRow(){$('board-rows').insertAdjacentHTML('beforeend',boardRow({}));}
function newsRow(n){return `<div class="panel" style="background:var(--sand);margin-bottom:10px"><div class="form-grid"><div><input class="nw-date" value="${esc(n.date||'')}" placeholder="08 Apr"></div><div><input class="nw-tag" value="${esc(n.tag||'')}" placeholder="Normen"></div><div class="full"><input class="nw-title" value="${esc(n.title||'')}" placeholder="Titel"></div><div class="full"><textarea class="nw-text" rows="2" placeholder="Text">${esc(n.text||'')}</textarea></div></div></div>`;}
function addNewsRow(){$('news-rows').insertAdjacentHTML('beforeend',newsRow({}));}

async function setContent(key,val){ try{ await rpc('board_set_content',{p_token:token(),p_key:key,p_value:val}); CONTENT[key]=val; _pubLoaded=false; toast('Gespeichert ✓'); }catch(e){ toast('Fehler: '+e.message,'err'); } }
function saveHero(){setContent('hero',{title:$('c-h-title').value,title2:$('c-h-title2').value,intro:$('c-h-intro').value});}
function saveAbout(){setContent('about',{title:$('c-a-title').value,text:$('c-a-text').value});}
function saveContact(){setContent('contact',{email:$('c-contact-email').value.trim()});}
function saveStats(){const n=[...document.querySelectorAll('.st-n')],l=[...document.querySelectorAll('.st-l')];
  const arr=n.map((x,i)=>({n:x.value.trim(),l:l[i].value.trim()})).filter(s=>s.n||s.l);setContent('stats',arr);}
function saveBoard(){const n=[...document.querySelectorAll('.bd-n')],r=[...document.querySelectorAll('.bd-r')];
  const arr=n.map((x,i)=>({name:x.value.trim(),role:r[i].value.trim()})).filter(b=>b.name);setContent('board',arr);}
function saveNews(){const d=[...document.querySelectorAll('.nw-date')],t=[...document.querySelectorAll('.nw-tag')],
  ti=[...document.querySelectorAll('.nw-title')],tx=[...document.querySelectorAll('.nw-text')];
  const arr=d.map((x,i)=>({date:x.value.trim(),tag:t[i].value.trim(),title:ti[i].value.trim(),text:tx[i].value.trim()})).filter(n=>n.title);setContent('news',arr);}

/* ---------- Init ---------- */
$('lg-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
$('login-modal').addEventListener('click',e=>{if(e.target.id==='login-modal')closeLogin();});
window.addEventListener('hashchange',route);
(async function(){ if(configured()){ try{await restoreSession();}catch{} } route(); })();
</script>
</body>
</html>

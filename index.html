<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVSS — Schweizerische Vereinigung Sichere Spielplätze</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<!-- Rich-Text: Quill 2 + DOMPurify 3 (synchron, damit global verfügbar vor route()) -->
<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root{
    --gd:#1a3a2a; --gm:#2d6a4a; --gs:#4a9068; --gp:#d4ead8; --gl:#f0f7f1;
    --accent:#c8522a; --cream:#faf8f3; --sand:#f5f1e8; --sand-d:#e8e2d4; --white:#fff;
    --text:#1a1a18; --soft:#4a4a44; --muted:#8a8a80; --border:#e3ddd0;
    --r:8px; --rl:16px; --sh-s:0 2px 8px rgba(0,0,0,.06); --sh-m:0 10px 34px rgba(0,0,0,.10);
    --sh-l:0 24px 70px rgba(0,0,0,.16); --t:.22s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'DM Sans',-apple-system,sans-serif;color:var(--text);background:var(--cream);
    line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.serif{font-family:'DM Serif Display',Georgia,serif;font-weight:400;line-height:1.12}
  a{color:var(--gm);text-decoration:none}
  img{max-width:100%;display:block}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r);transition:var(--t);font-size:14px}
  input,textarea,select{font-family:inherit;font-size:15px;width:100%;padding:11px 13px;border:1px solid var(--border);
    border-radius:var(--r);background:var(--white);color:var(--text)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gs);box-shadow:0 0 0 3px var(--gp)}
  textarea{resize:vertical;line-height:1.55}
  .wrap{max-width:1140px;margin:0 auto;padding:0 24px}
  .btn{padding:11px 22px;font-weight:600;border-radius:var(--r);font-size:14px}
  .btn-p{background:var(--gm);color:#fff}.btn-p:hover{background:var(--gd)}
  .btn-a{background:var(--accent);color:#fff}.btn-a:hover{filter:brightness(.93)}
  .btn-o{background:var(--white);color:var(--gm);border:1px solid var(--border)}.btn-o:hover{background:var(--gl);border-color:var(--gs)}
  .btn-sm{padding:7px 13px;font-size:13px;font-weight:600;border-radius:6px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* NAV */
  header.nav{position:sticky;top:0;z-index:40;background:rgba(250,248,243,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:68px}
  .logo{display:flex;align-items:center;gap:11px;cursor:pointer}
  .logo .mk{width:38px;height:38px;border-radius:10px;background:var(--gm);color:#fff;display:grid;place-items:center;
    font-family:'DM Serif Display',serif;font-size:18px}
  .logo .tx b{display:block;font-weight:700;font-size:15px;letter-spacing:.2px;line-height:1.1}
  .logo .tx span{font-size:11px;color:var(--muted)}
  .nav-links{display:flex;align-items:center;gap:26px}
  .nav-links a{color:var(--soft);font-weight:500;font-size:14.5px;cursor:pointer}
  .nav-links a:hover{color:var(--gd)}
  .nav-burger{display:none;background:none;font-size:22px;color:var(--gd)}
  .lang-switch{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
  .lang-opt{color:var(--muted);cursor:pointer;padding:2px 3px;transition:var(--t)}
  .lang-opt:hover{color:var(--gd)}
  .lang-opt.active{color:var(--gd);text-decoration:underline;text-underline-offset:3px}
  .lang-sep{color:var(--border)}

  /* HERO */
  .hero{background:linear-gradient(160deg,var(--gd),var(--gm) 75%);color:#eef4ee;padding:84px 0 96px;position:relative;overflow:hidden}
  .hero:after{content:"";position:absolute;right:-120px;bottom:-120px;width:420px;height:420px;border-radius:50%;
    background:rgba(255,255,255,.05)}
  .hero h1{font-size:clamp(38px,6vw,62px);color:#fff;margin:0}
  .hero .accent{color:var(--gp)}
  .hero p{max-width:560px;font-size:18px;color:#cfe0d2;margin:22px 0 32px}
  .hero .cta{display:flex;gap:14px;flex-wrap:wrap}
  .hero .btn-light{background:#fff;color:var(--gd)}.hero .btn-light:hover{background:var(--gp)}
  .hero .btn-line{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}.hero .btn-line:hover{background:rgba(255,255,255,.12)}

  /* STATS */
  .stats{background:var(--gd);color:#cfe0d2;padding:1px 0}
  .stats-in{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.08)}
  .stat{background:var(--gd);padding:26px 22px;text-align:center}
  .stat .n{font-family:'DM Serif Display',serif;font-size:30px;color:#fff;line-height:1}
  .stat .l{font-size:13px;margin-top:7px}

  section{padding:76px 0}
  .eyebrow{color:var(--accent);font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase}
  .sec-title{font-size:clamp(28px,4vw,40px);margin:8px 0 0}
  .lead{color:var(--soft);font-size:17px;max-width:640px;margin-top:16px}

  /* MEMBER GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;margin-top:36px}
  .firm{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:24px;cursor:pointer;
    transition:var(--t);display:flex;flex-direction:column;gap:8px}
  .firm:hover{transform:translateY(-3px);box-shadow:var(--sh-m);border-color:var(--gp)}
  .firm .lg{height:48px;display:flex;align-items:center;margin-bottom:6px}
  .firm .lg img{max-height:48px;width:auto;object-fit:contain}
  .firm .lg .ph{width:46px;height:46px;border-radius:10px;background:var(--gl);color:var(--gm);display:grid;place-items:center;
    font-family:'DM Serif Display',serif;font-size:20px}
  .firm h3{font-family:'DM Sans',sans-serif;font-weight:700;font-size:17px;line-height:1.25}
  .firm .loc{color:var(--muted);font-size:13.5px}
  .firm .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .tag{background:var(--gl);color:var(--gm);font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}

  /* ABOUT / VORSTAND / NEWS */
  .about{background:var(--sand)}
  .vorstand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:24px;margin-top:36px}
  .vb{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:30px 22px;text-align:center}
  .vb .av{width:140px;height:168px;border-radius:16px;overflow:hidden;background:var(--gp);color:var(--gd);display:grid;place-items:center;
    margin:0 auto 20px;font-family:'DM Serif Display',serif;font-size:30px}
  .vb b{display:block;font-size:15px;margin-bottom:5px}.vb span{color:var(--muted);font-size:13px}
  .vb .av img{width:100%;height:100%;object-fit:cover;border-radius:16px;display:block}
  .news{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:32px}
  .nc{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:24px}
  .nc .meta{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .nc .date{font-family:'DM Serif Display',serif;font-size:15px;color:var(--accent)}
  .nc h3{font-family:'DM Sans',sans-serif;font-weight:700;font-size:17px;margin:0 0 8px}
  .nc p{color:var(--soft);font-size:14.5px;margin:0}
  .nc .nc-img{width:100%;height:170px;object-fit:cover;border-radius:10px;margin-bottom:14px;display:block}
  .nc .nc-links{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px}
  .nc .nc-links a{font-size:13.5px;font-weight:600;color:var(--accent);text-decoration:none}
  .nc .nc-links a:hover{text-decoration:underline}
  .gal-strip{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
  .gal-strip .gi{position:relative;width:104px;height:78px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
  .gal-strip .gi img{width:100%;height:100%;object-fit:cover}
  .gal-strip .gi button{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:13px;line-height:18px;padding:0}
  .gal-pub{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:18px}
  .gal-pub img{width:100%;height:185px;object-fit:cover;border-radius:12px;border:1px solid var(--border)}
  .team-pub{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:18px}
  .team-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;display:flex;flex-direction:column;gap:3px}
  .team-card b{font-size:15.5px}
  .team-card .role{color:var(--muted);font-size:13.5px}
  .team-card a{font-size:13.5px;margin-top:4px}
  .tag-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .tag-opt{display:inline-flex;align-items:center;gap:7px;background:var(--white);border:1px solid var(--border);border-radius:30px;padding:7px 14px;font-size:13.5px;cursor:pointer;user-select:none;width:auto}
  .tag-opt:hover{border-color:var(--gs)}
  .tag-opt input{width:auto;margin:0}
  .tag-opt:has(input:checked){background:var(--gl);border-color:var(--gs);color:var(--gd);font-weight:600}

  /* FOOTER */
  footer{background:var(--gd);color:#a9c2af;padding:54px 0 30px;font-size:14px}
  footer a{color:#cfe0d2}
  .foot-top{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;padding-bottom:30px;border-bottom:1px solid rgba(255,255,255,.1)}
  .foot-bot{padding-top:22px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:#7d9a85}

  /* SUBPAGE */
  .sub-hero{background:var(--sand);padding:48px 0;border-bottom:1px solid var(--border)}
  .sub-head{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .sub-head .lg{width:88px;height:88px;border-radius:var(--rl);background:var(--white);border:1px solid var(--border);
    display:grid;place-items:center;overflow:hidden;padding:8px}
  .sub-head .lg img{max-height:72px;width:auto;object-fit:contain}
  .sub-head .lg .ph{font-family:'DM Serif Display',serif;font-size:32px;color:var(--gm)}
  .sub-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:40px;margin-top:44px}
  .info-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:14.5px}
  .info-row .k{color:var(--muted);min-width:120px;font-weight:500}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:500;cursor:pointer;font-size:14px}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(26,58,42,.5);display:none;place-items:center;z-index:60;padding:20px}
  .overlay.show{display:grid}
  .modal{background:var(--white);border-radius:var(--rl);box-shadow:var(--sh-l);width:100%;max-width:400px;padding:32px}
  .modal h2{font-size:24px;margin:0 0 4px}
  .modal p.sub{color:var(--muted);font-size:14px;margin:0 0 22px}
  .fg{margin-bottom:14px}.fg label{display:block;font-size:12.5px;font-weight:600;color:var(--soft);margin:0 0 5px}
  .err{color:var(--accent);font-size:13.5px;min-height:18px;margin-top:6px}

  /* PORTAL / ADMIN */
  .panel{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:28px;margin-bottom:22px}
  .panel h2{font-size:22px;margin:0 0 4px}.panel .ph{color:var(--muted);font-size:14px;margin:0 0 22px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-grid .full{grid-column:1/-1}
  .tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .tab{padding:9px 18px;border-radius:30px;background:var(--white);border:1px solid var(--border);font-weight:600;color:var(--soft)}
  .tab.active{background:var(--gd);color:#fff;border-color:var(--gd)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--sand)}
  .badge{font-size:11.5px;font-weight:650;padding:3px 10px;border-radius:20px}
  .badge.active{background:var(--gl);color:var(--gm)}.badge.blocked{background:#fbe7df;color:var(--accent)}
  td.r{text-align:right;white-space:nowrap}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:#fff;
    padding:12px 22px;border-radius:30px;font-size:14px;box-shadow:var(--sh-m);opacity:0;pointer-events:none;transition:var(--t);z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.err{background:var(--accent)}
  .config-warn{background:#fff4e8;border:1px solid #f0c89a;color:#9a5a1a;padding:14px 18px;border-radius:var(--r);
    margin:20px auto;max-width:1140px;font-size:14px}
  .hidden{display:none!important}
  .imp-banner{background:var(--accent);color:#fff;text-align:center;padding:9px 16px;font-size:13.5px;font-weight:600;position:sticky;top:0;z-index:45}
  .imp-banner a{color:#fff;text-decoration:underline;cursor:pointer;font-weight:700}

  /* RICH-TEXT (Quill) — Anzeige außerhalb des Editors */
  .rich{}
  .rich p{margin:0 0 10px}
  .rich p:last-child{margin-bottom:0}
  .rich h2{font-family:'DM Serif Display',Georgia,serif;font-size:24px;line-height:1.2;margin:18px 0 8px}
  .rich h3{font-family:'DM Serif Display',Georgia,serif;font-size:19px;line-height:1.25;margin:16px 0 6px}
  .rich ul,.rich ol{margin:0 0 12px;padding-left:22px}
  .rich li{margin:2px 0}
  .rich blockquote{margin:12px 0;padding:6px 14px;border-left:3px solid var(--gs);color:var(--soft);background:var(--gl);border-radius:0 6px 6px 0}
  .rich a{color:var(--gm);text-decoration:underline}
  .rich .ql-align-center{text-align:center}
  .rich .ql-align-right{text-align:right}
  .rich .ql-align-justify{text-align:justify}
  /* News-Card-Body bleibt optisch wie zuvor (soft, kleiner) */
  .nc .rich{color:var(--soft);font-size:14.5px}
  .nc .rich h2{font-size:20px}.nc .rich h3{font-size:17px}

  /* Quill-Editor im Formular passend zum Theme */
  .quill-wrap{background:var(--white);border-radius:var(--r)}
  .quill-wrap .ql-toolbar.ql-snow{border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;background:var(--sand)}
  .quill-wrap .ql-container.ql-snow{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r)}
  .quill-wrap .ql-editor{min-height:140px;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.55;color:var(--text)}
  .quill-wrap .ql-editor.ql-blank::before{color:var(--muted);font-style:normal}
  .quill-hint{font-size:12.5px;color:var(--muted);margin:6px 0 0}

  /* SUCHE */
  .search-bar{display:flex;gap:10px;margin-top:30px;flex-wrap:wrap}
  .search-bar input{flex:1;min-width:200px}
  .search-bar .btn{flex:none}
  .search-group{margin-top:34px}
  .search-group > h3{font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:22px;margin:0 0 14px;
    display:flex;align-items:baseline;gap:10px}
  .search-group > h3 .cnt{font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;color:var(--gm);
    background:var(--gl);border-radius:20px;padding:2px 11px}
  .search-hit{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:12px;
    transition:var(--t)}
  .search-hit:hover{border-color:var(--gp);box-shadow:var(--sh-s)}
  .search-hit .ht-title{font-weight:700;font-size:15.5px;color:var(--text)}
  .search-hit a.ht-title{color:var(--gm);cursor:pointer}
  .search-hit a.ht-title:hover{color:var(--gd);text-decoration:underline}
  .search-hit .ht-meta{color:var(--muted);font-size:13px;margin-top:2px}
  .search-hit .ht-snippet{color:var(--soft);font-size:14px;margin-top:7px;line-height:1.55}
  #search-results b{background:var(--gp);color:var(--gd);font-weight:700;border-radius:3px;padding:0 2px}
  .search-empty{color:var(--muted);font-size:15px;margin-top:30px}

  .member-toggle{display:none}
  @media(max-width:820px){
    .nav-links{display:none}.nav-burger{display:block}
    .nav-links.open{display:flex;position:absolute;top:68px;left:0;right:0;flex-direction:column;background:var(--cream);
      padding:18px 24px;gap:16px;border-bottom:1px solid var(--border)}
    .stats-in{grid-template-columns:repeat(2,1fr)}
    .sub-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}
    .member-toggle{display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:11px 20px;border-radius:30px;background:var(--gm);color:#fff;font-weight:600;font-size:14px}
    .member-list{display:none}
    .member-list.open{display:block}
  }
</style>
</head>
<body>
<div id="config-warn" class="config-warn hidden"></div>
<div id="app"></div>
<div class="toast" id="toast"></div>

</div>

function t(k){ return (I18N[LANG]&&I18N[LANG][k]) || I18N.de[k] || k; }
function setLang(l){
  if(!I18N[l]) return;
  LANG=l; localStorage.setItem('svss_lang',l);
  try{ document.documentElement.lang=l; }catch(e){}
  if(typeof SESSION!=='undefined' && SESSION && token()){ try{ rpc('set_my_lang',{p_token:token(),p_lang:l}); }catch(e){} }
  route();
}
function langSwitcher(){
  return `<span class="lang-switch">${LANGS.map(([code,label])=>
    `<span class="lang-opt${LANG===code?' active':''}" onclick="setLang('${code}')">${label}</span>`
  ).join('<span class="lang-sep">·</span>')}</span>`;
}
/* ---------- Inhalts-Übersetzung (Cache; gefüllt von Hand bzw. später per translate-Function) ---------- */
let TRC={};
async function _sha256hex(s){ const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
async function preloadTr(strings){
  TRC={};
  if(LANG==='de') return;
  const uniq=[...new Set((strings||[]).filter(s=>s&&String(s).trim()))];
  if(!uniq.length) return;
  try{
    const hashes=await Promise.all(uniq.map(_sha256hex));
    const map=await rpc('translations_get',{p_lang:LANG,p_hashes:hashes});
    uniq.forEach((s,i)=>{ const v=map&&map[hashes[i]]; if(v) TRC[s]=v; });
  }catch(e){}
}
function tr(s){ if(LANG==='de'||!s) return s; return (TRC[s]!=null?TRC[s]:s); }

/* ---------- Rich-Text (Quill + DOMPurify) ---------- */
const RICH_TOOLBAR = [
  ['bold','italic','underline'],
  [{header:2},{header:3}],
  [{list:'ordered'},{list:'bullet'}],
  [{align:''},{align:'center'},{align:'right'}],
  [{color:[]},{background:[]}],
  ['link'],
  ['clean']
];
const QUILL_INSTANCES = {};
// Instanziiert einen Quill-Editor auf #elId, setzt initiales HTML, gibt Instanz zurück.
function mountQuill(elId, html){
  const el=$(elId); if(!el || typeof Quill==='undefined') return null;
  const q=new Quill(el,{theme:'snow',modules:{toolbar:RICH_TOOLBAR}});
  if(html){ q.clipboard.dangerouslyPasteHTML(String(html)); }
  QUILL_INSTANCES[elId]=q;
  return q;
}
// Liefert das HTML der Instanz; leeres '<p><br></p>' -> ''.
function quillHtml(inst){
  if(!inst) return '';
  let h=inst.root.innerHTML||'';
  if(/^\s*<p>\s*(<br\s*\/?>)?\s*<\/p>\s*$/i.test(h)) return '';
  return h;
}
// Sicheres Anzeige-HTML: HTML -> sanitize; reiner Text -> escapen + \n->,<br>.
function renderRich(value){
  const v=value==null?'':String(value);
  if(!v.trim()) return '';
  const hasTags=/<[a-z][\s\S]*>/i.test(v);
  let html;
  if(hasTags && typeof DOMPurify!=='undefined'){
    html=DOMPurify.sanitize(v,{
      ALLOWED_TAGS:['p','br','strong','em','u','h2','h3','ul','ol','li','a','blockquote','span'],
      ALLOWED_ATTR:['href','target','rel','class','style']
    });
  } else if(hasTags){
    // Fallback ohne DOMPurify: lieber escapen als ungefiltert ausgeben
    html=esc(v).replace(/\n/g,'<br>');
  } else {
    html=esc(v).replace(/\n/g,'<br>');
  }
  // Links absichern: target=_blank rel=noopener
  html=html.replace(/<a\s+([^>]*)>/gi,(m,attrs)=>{
    let a=attrs;
    if(!/target\s*=/i.test(a)) a+=' target="_blank"';
    if(!/rel\s*=/i.test(a)) a+=' rel="noopener"';
    return '<a '+a+'>';
  });
  return html;
}

function configured(){ return SUPA_URL && SUPA_KEY; }

/* ---------- Supabase ---------- */
function heads(){const h={apikey:SUPA_KEY,'Content-Type':'application/json'};
  if(SUPA_KEY.startsWith('eyJ'))h['Authorization']='Bearer '+SUPA_KEY; // nur Legacy-JWT-Keys als Bearer
  return h;}
async function rpc(fn,args){
  const r=await fetch(SUPA_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:heads(),body:JSON.stringify(args||{})});
  const txt=await r.text(); let data; try{data=JSON.parse(txt);}catch{data=txt;}
  if(!r.ok) throw new Error((data&&data.message)||('Fehler '+r.status));
  return data;
}
async function sel(table,query){
  const p=new URLSearchParams(query||{});
  const r=await fetch(SUPA_URL+'/rest/v1/'+table+'?'+p,{headers:{...heads(),Accept:'application/json'}});
  if(!r.ok) throw new Error('Laden fehlgeschlagen ('+r.status+')');
  return r.json();
}

/* ---------- Daten laden ---------- */
async function loadPublic(){
  const [content, comps, board, courses] = await Promise.all([
    sel('site_content',{select:'*'}),
    sel('companies',{select:'*',status:'eq.active',order:'sort_order.asc'}),
    rpc('public_board').catch(()=>[]),
    rpc('courses_list').catch(()=>[])
  ]);
  CONTENT={}; content.forEach(r=>CONTENT[r.key]=r.value);
  COMPANIES=comps;
  COURSES = Array.isArray(courses)?courses:[];
  BOARDPERSONS = (Array.isArray(board)?board:[]).slice().sort((a,b)=>{
    const pa=/präsident/i.test(a.function||'')?0:1, pb=/präsident/i.test(b.function||'')?0:1;
    return pa-pb;
  });
}
async function restoreSession(){
  if(!token()) return;
  try{ const r=await rpc('me',{p_token:token()}); SESSION = r.ok ? r : null; if(!r.ok) localStorage.removeItem(TOKEN_KEY); }
  catch{ SESSION=null; }
}

/* ---------- Auth ---------- */
function openLogin(){
  $('lg-err').textContent=''; $('lg-user').value=''; $('lg-pw').value='';
  $('lg-title').textContent=t('login.title'); $('lg-sub').textContent=t('login.sub');
  $('lg-l-user').textContent=t('login.user'); $('lg-l-pw').textContent=t('login.pw');
  $('lg-submit').textContent=t('login.submit'); $('lg-cancel').textContent=t('login.cancel');
  $('login-modal').classList.add('show'); setTimeout(()=>$('lg-user').focus(),50);
}
function closeLogin(){ $('login-modal').classList.remove('show'); }
async function doLogin(){
  const u=$('lg-user').value.trim(), p=$('lg-pw').value;
  $('lg-err').textContent='';
  try{
    const r=await rpc('login',{p_user:u,p_pw:p});
    if(!r.ok){ $('lg-err').textContent=t('login.error'); return; }
    localStorage.setItem(TOKEN_KEY,r.token);
    SESSION={is_board:!!r.is_board,company_slug:r.company_slug,name:r.name};
    closeLogin();
    location.hash = r.company_slug ? '#/konto' : '#/vorstand';
    toast('Willkommen, '+r.name);
  }catch(e){ $('lg-err').textContent=t('login.connError'); }
}
async function logout(){ try{await rpc('logout',{p_token:token()});}catch{} localStorage.removeItem(TOKEN_KEY); SESSION=null; location.hash='#/'; toast('Abgemeldet'); }

/* ---------- Router ---------- */
async function route(){
  const h=location.hash||'#/';
  if(!configured()){ $('config-warn').classList.remove('hidden');
    $('config-warn').innerHTML='⚙ Noch nicht konfiguriert: trage oben im Code <b>SUPA_URL</b> und <b>SUPA_KEY</b> deines neuen Supabase-Projekts ein.';
  }
  try{
    if(h.startsWith('#/firma/')){ await ensurePublic(); renderCompany(decodeURIComponent(h.slice(8))); }
    else if(h==='#/konto'){ if(!SESSION){openLogin();location.hash='#/';return;} if(!SESSION.company_slug){location.hash='#/vorstand';return;} renderPortal(); }
    else if(h==='#/vorstand'){ if(!SESSION||!SESSION.is_board){openLogin();location.hash='#/';return;} renderAdmin(); }
    else if(h==='#/downloads'){ if(!SESSION){openLogin();location.hash='#/';return;} await ensurePublic(); renderDownloads(); }
    else if(h==='#/suche'){ if(!SESSION){openLogin();location.hash='#/';return;} await ensurePublic(); renderSearch(); }
    else if(h==='#/mitglied-werden'){ await ensurePublic(); renderApply(); }
    else if(h==='#/anfrage'){ await ensurePublic(); renderInquiry(); }
    else if(h==='#/schulungen'){ await ensurePublic(); renderCourses(); }
    else { await ensurePublic(); await renderHome(); }
  }catch(e){ $('app').innerHTML='<div class="wrap" style="padding:60px 24px"><p>'+t('common.errLoad')+esc(e.message)+'</p></div>'; }
  window.scrollTo(0,0);
}

// Spaltenzahl so wählen, dass nie genau EINE Person allein in der letzten Zeile steht.
function layoutBoardGrid(){
  const g=document.getElementById('vorstand-grid'); if(!g) return;
  const n=g.children.length; if(!n) return;
  if(window.innerWidth<=560){ g.style.gridTemplateColumns='1fr'; return; } // Mobile: normale Stapelung
  const w=g.clientWidth||g.offsetWidth||900;
  let cols=Math.max(1, Math.min(n, Math.floor((w+24)/(175+24)))); // wie viele Karten à ~175px + 24px gap passen
  while(cols>1 && (n % cols)===1) cols--;  // Einzel-Waise vermeiden → mind. 2 in letzter Zeile
  g.style.gridTemplateColumns='repeat('+cols+',minmax(0,1fr))';
}
if(!window.__boardGridResize){ window.__boardGridResize=true; let _t; window.addEventListener('resize',()=>{ clearTimeout(_t); _t=setTimeout(layoutBoardGrid,120); }); }

async function uploadGallery(input){
  const files=[...(input.files||[])]; if(!files.length) return;
  for(const file of files){
    if(!file.type.startsWith('image/')) continue;
    try{
      let dataB64, fname=(file.name||'bild');
      const url=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(file);});
      const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});
      const max=1400;let w=img.width,h=img.height;if(w>=h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      dataB64=cv.toDataURL('image/jpeg',0.85).split(',')[1];
      toast('Bild wird hochgeladen…');
      const r=await fetch(FN_UPLOAD_URL,{method:'POST',headers:{...heads()},body:JSON.stringify({token:token(),filename:(fname.replace(/\.[^.]*$/,'')||'bild')+'.jpg',content_type:'image/jpeg',data_base64:dataB64})});
      let d={}; try{d=await r.json();}catch(e){}
      if(!r.ok||d.error||!d.url){ toast(d.error||('Fehler '+r.status),'err'); continue; }
      MYGALLERY.push(d.url); renderGalleryStrip();
    }catch(e){ toast('Upload-Fehler: '+(e.message||e),'err'); }
  }
  input.value='';
  toast('Bilder geladen ✓ — jetzt «Speichern» klicken');
}

function feeInvoice(slug){
  const f=FEES.find(x=>x.slug===slug);
  if(!f){ toast('Mitglied nicht gefunden','err'); return; }
  const amount=Number(f.amount||0);
  if(!amount){ toast('Bitte zuerst einen Betrag erfassen','err'); return; }
  // Debtor-Adresse: billing_* falls vorhanden, sonst Stammadresse
  const comp=(COMPANIES||[]).find(c=>c.slug===slug)||{};
  const dName=f.billing_name||f.name||comp.name||'';
  const dStreet=f.billing_street||comp.street||'';
  const dZip=f.billing_zip||comp.zip||'';
  const dCity=f.billing_city||comp.city||'';
  const debtor=(dName&&dStreet&&dZip&&dCity)?{ name:dName, address:dStreet, zip:Number(dZip)||dZip, city:dCity, country:'CH' }:null;
  const message='Mitgliederbeitrag '+feeYear;
  openQrInvoice({amount,debtor,message});
}
async function openQrInvoice(o){
  const win=window.open('','_blank');
  if(!win){ toast('Pop-up blockiert — bitte erlauben','err'); return; }
  win.document.write('<!doctype html><html lang="de"><head><meta charset="utf-8"><title>QR-Rechnung '+feeYear+'</title></head><body style="font-family:Arial,Helvetica,sans-serif;margin:0">Rechnung wird erstellt…</body></html>');
  win.document.close();
  try{
    // jsDelivr +esm liefert ein auto-gebundletes ES-Modul inkl. Abhängigkeiten (svg-engine etc.)
    const mod=await import('https://cdn.jsdelivr.net/npm/swissqrbill@4/svg/+esm');
    const SwissQRBill = mod.SwissQRBill || (mod.svg && mod.svg.SwissQRBill) || (mod.default && (mod.default.SwissQRBill || (mod.default.svg && mod.default.svg.SwissQRBill)));
    if(!SwissQRBill) throw new Error('SwissQRBill export nicht gefunden');
    // creditor.account = IBAN; ohne reference -> Referenztyp NON
    const data={ currency:'CHF', amount:Number(o.amount),
      creditor:{ account:SVSS_IBAN, name:SVSS_CREDITOR.name, address:SVSS_CREDITOR.address, zip:SVSS_CREDITOR.zip, city:SVSS_CREDITOR.city, country:SVSS_CREDITOR.country },
      message:o.message };
    if(o.debtor) data.debtor=o.debtor;
    const bill=new SwissQRBill(data, { language:'DE' });
    const svgStr = bill.toString ? bill.toString() : (bill.element && bill.element.outerHTML);
    win.document.open();
    win.document.write(qrInvoiceHtml(o, svgStr));
    win.document.close();
  }catch(e){
    // Fallback: druckbares A4-Dokument ohne QR-Bild
    /* TODO: QR-Code-Swiss-Cross via swissqrbill */
    win.document.open();
    win.document.write(qrInvoiceHtml(o, null, e&&e.message));
    win.document.close();
  }
}
function qrInvoiceHtml(o, svgStr, fallbackErr){
  const fmtChf=n=>Number(n||0).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});
  const dbl = o.debtor?`${esc(o.debtor.name)}<br>${esc(o.debtor.address)}<br>${esc(o.debtor.zip)} ${esc(o.debtor.city)}`:'—';
  const qrBlock = svgStr
    ? `<div style="border-top:1px dashed #000;margin-top:30px">${svgStr}</div>`
    : `<div style="border:1px solid #000;padding:18px;margin-top:24px">
         <h3 style="margin:0 0 10px">Zahlungsangaben (manuell)</h3>
         <p style="margin:4px 0"><b>Konto / IBAN:</b> ${esc(SVSS_IBAN)}</p>
         <p style="margin:4px 0"><b>Zahlbar an:</b><br>${esc(SVSS_CREDITOR.name)}<br>${esc(SVSS_CREDITOR.address)}<br>${esc(SVSS_CREDITOR.zip)} ${esc(SVSS_CREDITOR.city)}</p>
         <p style="margin:4px 0"><b>Betrag:</b> CHF ${fmtChf(o.amount)}</p>
         <p style="margin:4px 0"><b>Verwendungszweck:</b> ${esc(o.message)}</p>
         <p style="margin:4px 0"><b>Zahlbar durch:</b><br>${dbl}</p>
         <p style="margin:14px 0 0;color:#a33;font-size:12px">Hinweis: QR-Code konnte nicht erzeugt werden${fallbackErr?(' ('+esc(fallbackErr)+')'):''}. Bitte Zahlungsangaben manuell verwenden.</p>
       </div>`;
  return `<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Mitgliederbeitrag ${feeYear}</title>
    <style>@page{size:A4;margin:18mm}body{font-family:Arial,Helvetica,sans-serif;color:#111;margin:0;padding:24px;line-height:1.5}
    h1{font-size:22px;margin:0 0 4px}.muted{color:#666;font-size:13px}.box{margin-top:18px}
    .addr{margin-top:8px;font-size:14px}.amt{font-size:18px;font-weight:bold;margin-top:14px}
    @media print{.noprint{display:none}}</style></head>
    <body onload="setTimeout(function(){window.print()},400)">
      <button class="noprint" onclick="window.print()" style="float:right;padding:8px 16px">Drucken / als PDF speichern</button>
      <h1>Mitgliederbeitrag ${feeYear}</h1>
      <p class="muted">${esc(SVSS_CREDITOR.name)}</p>
      <div class="box"><b>Rechnung an:</b><div class="addr">${dbl}</div></div>
      <div class="box"><b>Empfänger / Konto:</b><div class="addr">${esc(SVSS_CREDITOR.name)}<br>${esc(SVSS_CREDITOR.address)}, ${esc(SVSS_CREDITOR.zip)} ${esc(SVSS_CREDITOR.city)}<br>IBAN: ${esc(SVSS_IBAN)}</div></div>
      <div class="amt">Betrag: CHF ${fmtChf(o.amount)}</div>
      <p class="muted">Verwendungszweck: ${esc(o.message)} · MwSt-befreit</p>
      ${qrBlock}
    </body></html>`;
}

// Liest aktuelle Formularwerte (inkl. Quill-HTML) in NEWS_DRAFT zurück.
function syncNewsDraftFromEditors(){
  const rows=[...document.querySelectorAll('#news-rows .news-row')];

  NEWS_DRAFT = rows.map((r,i)=>({
    date:r.querySelector('.nw-date').value.trim(),

    pdf:r.querySelector('.nw-pdf').value.trim()
  }));

function moveNewsRow(i,dir){
  syncNewsDraftFromEditors();
  const j=i+dir;
  if(j<0||j>=NEWS_DRAFT.length) return;
  const tmp=NEWS_DRAFT[i]; NEWS_DRAFT[i]=NEWS_DRAFT[j]; NEWS_DRAFT[j]=tmp;
  drawAdminNews();
}
function removeNewsRow(i){
  syncNewsDraftFromEditors();
  NEWS_DRAFT.splice(i,1);

// Rendert Seite 1 eines PDFs zu einem JPEG-Thumbnail (data-URL) und lädt es hoch → gibt URL zurück.
async function uploadPdfThumb(file){
  try{
    const pdfjs=await getPdfjs(); if(!pdfjs) return null;
    const buf=await file.arrayBuffer();
    const pdf=await pdfjs.getDocument({data:buf}).promise;
    const page=await pdf.getPage(1);
    const v0=page.getViewport({scale:1});
    const scale=Math.min(2.5, 560/v0.width);
    const vp=page.getViewport({scale});
    const cv=document.createElement('canvas'); cv.width=Math.round(vp.width); cv.height=Math.round(vp.height);
    const ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    const b64=cv.toDataURL('image/jpeg',0.8).split(',')[1];
    const r=await fetch(FN_UPLOAD_URL,{method:'POST',headers:{...heads()},body:JSON.stringify({token:token(),filename:(file.name||'doc').replace(/\.[^.]*$/,'')+'-thumb.jpg',content_type:'image/jpeg',data_base64:b64})});
    const d=await r.json(); return (r.ok&&d.url)?d.url:null;
  }catch(e){ return null; }
}

/* ---------- PROTOKOLL-VISIERUNG (Vorstand) ---------- */
function _esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function _tok(t){return (t||'').split(/(\s+)/);} // behält Whitespace
function wordDiffHtml(base, proposed, color){
  const a=_tok(base), b=_tok(proposed), n=a.length, m=b.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--)
    dp[i][j]= a[i]===b[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j],dp[i][j+1]);
  let i=0,j=0,out='';
  const ins=s=>`<span style="color:${color};text-decoration:underline;background:${color}1a">${_esc(s)}</span>`;
  const del=s=>`<span style="color:${color};text-decoration:line-through;opacity:.8">${_esc(s)}</span>`;
  while(i<n&&j<m){
    if(a[i]===b[j]){ out+=_esc(a[i]); i++; j++; }
    else if(dp[i+1][j]>=dp[i][j+1]){ out+=del(a[i]); i++; }
    else { out+=ins(b[j]); j++; }
  }
  while(i<n){ out+=del(a[i++]); }
  while(j<m){ out+=ins(b[j++]); }
  return out;
}

function fmtCourseDate(s,e){
  if(!s) return t('courses.dateOpen');
  const loc={de:'de-CH',fr:'fr-CH',it:'it-CH',rm:'rm-CH',en:'en-GB'}[LANG]||'de-CH';
  const ds=new Date(s+'T00:00:00'), de=e?new Date(e+'T00:00:00'):null;
  const full=d=>d.toLocaleDateString(loc,{day:'2-digit',month:'short',year:'numeric'});
  if(!de || +de===+ds) return full(ds);
  if(ds.getFullYear()===de.getFullYear()){
    if(ds.getMonth()===de.getMonth()) return ds.toLocaleDateString(loc,{day:'2-digit'})+'–'+full(de);
    return ds.toLocaleDateString(loc,{day:'2-digit',month:'short'})+' – '+full(de);
  }
  return full(ds)+' – '+full(de);
}

function renderInquiryImgStrip(){
  const el=$('inq-img-strip'); if(!el) return;
  el.innerHTML = INQ_IMAGES.map((u,i)=>`<div class="gi"><img src="${esc(u)}" alt=""><button onclick="removeInquiryImage(${i})" title="Entfernen">×</button></div>`).join('');
}
function removeInquiryImage(i){ INQ_IMAGES.splice(i,1); renderInquiryImgStrip(); }
async function onInquiryImages(input){
  const files=[...(input.files||[])]; if(!files.length) return;
  for(const file of files){
    if(!file.type.startsWith('image/')) continue;
    try{
      const url=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(file);});
      const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});
      const max=1400;let w=img.width,h=img.height;if(w>=h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      INQ_IMAGES.push(cv.toDataURL('image/jpeg',0.85));
      renderInquiryImgStrip();
    }catch(e){ toast('Bild-Fehler: '+(e.message||e),'err'); }
  }
  input.value='';
}
function inquiryErrMsg(m){
  const map={ email_required:t('inquiry.err.email'), question_required:t('inquiry.err.question') };
  return map[m]||('Fehler: '+m);
}
async function submitInquiry(){
  $('inq-err').textContent='';
  const v=id=>($(id).value||'').trim();
  const name=v('inq-name'), email=v('inq-email'), subject=v('inq-subject'), question=v('inq-question'), topic=v('inq-topic');
  if(!email){ $('inq-err').textContent=inquiryErrMsg('email_required'); return; }
  if(!question){ $('inq-err').textContent=inquiryErrMsg('question_required'); return; }
  try{
    await rpc('submit_inquiry',{ p_name:name||null, p_email:email, p_subject:subject||null, p_question:question, p_images:INQ_IMAGES, p_topic:topic||null });
    INQ_IMAGES=[];
    $('inq-form').classList.add('hidden');
    const done=$('inq-done'); done.classList.remove('hidden');
    done.innerHTML=`<div class="panel" style="border-color:var(--gs);margin-top:30px"><h2 style="font-size:20px;color:var(--gm)">${t('inquiry.thanks')}</h2>
      <p class="lead" style="margin-top:8px">${t('inquiry.thanksText')}</p>
      <button class="btn btn-o" style="margin-top:10px" onclick="location.hash='#/'">${t('inquiry.toHome')}</button></div>`;
    window.scrollTo(0,0);
  }catch(e){
    const key=(e.message||'').replace(/[^a-z_]/gi,'').match(/(email_required|question_required)/);
    $('inq-err').textContent = key?inquiryErrMsg(key[0]):(t('inquiry.err.send')+e.message);
  }
}

function inquiryToggleChange(){ const b=$('inq-change-box'); if(b){ b.classList.toggle('hidden'); if(!b.classList.contains('hidden')){ const ta=$('inq-proposed'); if(ta) ta.focus(); } } }
async function inquirySaveDraft(id){
  const draft=($('inq-draft')&&$('inq-draft').value)||'';
  try{ await rpc('board_inquiry_set_draft',{p_token:token(),p_id:id,p_draft:draft}); toast('Entwurf gespeichert ✓'); renderInquiryReview(id); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}
async function inquiryVisieren(id){
  try{ await rpc('board_inquiry_review',{p_token:token(),p_id:id,p_decision:'visiert',p_proposed_text:null,p_comment:null}); toast('Visiert ✓'); renderInquiryReview(id); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}
async function inquiryAenderung(id){
  const proposed=($('inq-proposed')&&$('inq-proposed').value)||'';
  const comment=($('inq-comment')&&$('inq-comment').value.trim())||'';
  if(!proposed.trim()){ toast('Bitte den bearbeiteten Antworttext angeben','err'); return; }
  try{ await rpc('board_inquiry_review',{p_token:token(),p_id:id,p_decision:'aenderung',p_proposed_text:proposed,p_comment:comment||null}); toast('Änderung beantragt ✓'); renderInquiryReview(id); }
  catch(e){ toast('Fehler: '+e.message,'err'); }
}
async function inquirySend(id,status){
  if(status!=='visiert'){ if(!confirm('Die Antwort ist noch nicht vollständig visiert – trotzdem an den Fragesteller senden?')) return; }
  else { if(!confirm('Antwort jetzt per E-Mail an den Fragesteller senden?')) return; }
  try{
    const r=await fetch(SUPA_URL+'/functions/v1/inquiry-answer',{method:'POST',headers:{...heads()},body:JSON.stringify({token:token(),id})});
    let d={}; try{d=await r.json();}catch(e){}
    if(!r.ok||d.error){ toast(d.error||('Fehler '+r.status),'err'); return; }
    toast('Antwort an '+(d.to||'Fragesteller')+' gesendet ✓');
    renderInquiryReview(id);
  }catch(e){ toast('Sende-Fehler: '+(e.message||e),'err'); }
}

// Säubert ts_headline-Snippets: nur <b> erlauben (snippet ist NICHT vorab escaped).
function searchSnippet(s){
  if(!s) return '';
  if(typeof DOMPurify==='undefined') return esc(s);
  return DOMPurify.sanitize(String(s),{ALLOWED_TAGS:['b'],ALLOWED_ATTR:[]});
}

async function doSearch(){
  const inp=$('search-q'); const q=inp?inp.value.trim():'';
  const out=$('search-results'); if(!out) return;
  if(!q){ out.innerHTML='<p class="search-empty">'+t('search.empty')+'</p>'; return; }
  out.innerHTML='<p class="lead" style="margin-top:24px">'+t('search.running')+'</p>';
  let r;
  try{ r=await rpc('search_members',{p_token:token(),p_q:q}); }
  catch(e){ out.innerHTML='<p class="search-empty">'+t('search.error')+esc(e.message)+'</p>'; return; }
  r=r||{};
  const companies=Array.isArray(r.companies)?r.companies:[];
  const news=Array.isArray(r.news)?r.news:[];
  const documents=Array.isArray(r.documents)?r.documents:[];
  const total=companies.length+news.length+documents.length;
  if(!total){ out.innerHTML='<p class="search-empty">'+t('search.noHits')+' «'+esc(q)+'».</p>'; return; }
  let html='';
  if(companies.length){
    html+='<div class="search-group"><h3>'+t('search.grpMembers')+' <span class="cnt">'+companies.length+'</span></h3>'+
      companies.map(c=>{
        const loc=esc(c.city||'');
        return '<div class="search-hit">'+
          '<a class="ht-title" onclick="location.hash=\'#/firma/'+encodeURIComponent(c.slug)+'\'">'+esc(c.name||'')+'</a>'+
          (loc?'<div class="ht-meta">'+loc+'</div>':'')+
          (c.snippet?'<div class="ht-snippet">'+searchSnippet(c.snippet)+'</div>':'')+
        '</div>';
      }).join('')+'</div>';
  }
  if(news.length){
    html+='<div class="search-group"><h3>'+t('search.grpNews')+' <span class="cnt">'+news.length+'</span></h3>'+
      news.map(n=>{
        return '<div class="search-hit">'+
          '<div class="ht-title">'+esc(n.title||'')+'</div>'+
          (n.date?'<div class="ht-meta">'+esc(n.date)+'</div>':'')+
          (n.snippet?'<div class="ht-snippet">'+searchSnippet(n.snippet)+'</div>':'')+
        '</div>';
      }).join('')+'</div>';
  }
  if(documents.length){
    html+='<div class="search-group"><h3>'+t('search.grpDocs')+' <span class="cnt">'+documents.length+'</span></h3>'+
      documents.map(d=>{
        const cat=docCatLabel(d.category);
        const link=d.file_url?'<a class="ht-title" href="'+esc(d.file_url)+'" target="_blank" rel="noopener">'+esc(d.title||'Dokument')+(d.is_link?' ↗':'')+'</a>':'<span class="ht-title">'+esc(d.title||'Dokument')+'</span>';
        return '<div class="search-hit">'+
          link+
          (cat?'<div class="ht-meta">'+esc(cat)+'</div>':'')+
          (d.snippet?'<div class="ht-snippet">'+searchSnippet(d.snippet)+'</div>':'')+
        '</div>';
      }).join('')+'</div>';
  }
  out.innerHTML=html;
}

/* ---------- PDF-Textextraktion (pdf.js, dynamisch geladen) ---------- */
let _pdfjsLib=null;
async function getPdfjs(){
  if(_pdfjsLib) return _pdfjsLib;
  const lib=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4/build/pdf.min.mjs');
  lib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4/build/pdf.worker.min.mjs';
  _pdfjsLib=lib;
  return lib;
}
// Extrahiert den Text aller Seiten eines PDF. Defensiv: bei Fehler/Nicht-PDF -> ''.
async function extractPdfText(file){
  try{
    if(!file || file.type!=='application/pdf') return '';
    const lib=await getPdfjs();
    const buf=await file.arrayBuffer();
    const pdf=await lib.getDocument({data:new Uint8Array(buf)}).promise;
    let parts=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      parts.push(tc.items.map(it=>it.str).join(' '));
    }
    return parts.join('\n').replace(/\s+/g,' ').trim();
  }catch(e){ return ''; }
}

function onApplyLogo(e){
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  if(!file.type.startsWith('image/')){ toast(t('apply.errImg'),'err'); return; }
  const fr=new FileReader();
  fr.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=320; let w=img.width,h=img.height;
    if(w>=h){ if(w>max){ h=Math.round(h*max/w); w=max; } } else { if(h>max){ w=Math.round(w*max/h); h=max; } }
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
    APPLY_LOGO=cv.toDataURL('image/png');
    const pv=$('ap-logo-prev'); if(pv) pv.innerHTML='<img src="'+APPLY_LOGO+'" style="width:100%;height:100%;object-fit:contain">';
  }; img.onerror=()=>toast(t('apply.errImgRead'),'err'); img.src=fr.result; };
  fr.readAsDataURL(file);
}
function applyErrMsg(m){
  const map={ email_required:t('apply.err.email'), name_required:t('apply.err.name'),
    phone_required:t('apply.err.phone'),
    company_name_required:t('apply.err.company') };

}
async function submitApply(){

  const v=id=>($(id).value||'').trim();
  const company=v('ap-company'), first=v('ap-first'), last=v('ap-last'),
    email=v('ap-email'), phone=v('ap-phone'), mobile=v('ap-mobile');
  if(type==='firma' && !company){ $('ap-err').textContent=applyErrMsg('company_name_required'); return; }
  if(!first||!last){ $('ap-err').textContent=applyErrMsg('name_required'); return; }
  if(!email){ $('ap-err').textContent=applyErrMsg('email_required'); return; }
  if(!phone&&!mobile){ $('ap-err').textContent=applyErrMsg('phone_required'); return; }
  const args={ p_member_type:type, p_company_name:type==='firma'?company:null,
    p_contact_first:first, p_contact_last:last, p_street:v('ap-street'), p_zip:v('ap-zip'), p_city:v('ap-city'),
    p_email:email, p_phone:phone||null, p_mobile:mobile||null,
    p_birthdate:type==='privat'&&v('ap-birthdate')?v('ap-birthdate'):null,
    p_billing_name:v('ap-bn')||null, p_billing_street:v('ap-bstreet')||null, p_billing_zip:v('ap-bzip')||null,
    p_billing_city:v('ap-bcity')||null, p_billing_email:v('ap-bemail')||null };
  if(APPLY_LOGO) args.p_logo_url=APPLY_LOGO;
  try{
    await rpc('apply_membership',args);
    $('apply-form').classList.add('hidden');
    const done=$('apply-done'); done.classList.remove('hidden');
    done.innerHTML=`<div class="panel" style="border-color:var(--gs);margin-top:30px"><h2 style="font-size:20px;color:var(--gm)">${t('apply.thanks')}</h2>

      <button class="btn btn-o" style="margin-top:10px" onclick="location.hash='#/'">${t('inquiry.toHome')}</button></div>`;
    window.scrollTo(0,0);
  }catch(e){
    const key=(e.message||'').replace(/[^a-z_]/gi,'').match(/(email_required|name_required|phone_required|company_name_required)/);
    $('ap-err').textContent = key?applyErrMsg(key[0]):(t('apply.err.send')+e.message);
  }
}
